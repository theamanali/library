<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>
</head>
<body>
    <header>
        <h1>Library</h1>
        <button id="add-book-button">Add book</button>
    </header>
    <main>
        <h2>Your Books: </h2>
        <div class="no-books-text">
            <p>Oh, no! You have no books :(</p>
            <p>Try adding one in the top right</p>
        </div>
        <div class="books-container">

        </div>

        <dialog id="add-book-dialog">
            <form id="add-book-form">
                <label for="title" class="titleLabel">Title:</label>
                <input type="text" name="title" id="title" required>
                <label for="author" class="authorLabel">Author:</label>
                <input type="text" name="author" id="author" required>
                <label for="pages" class="pagesLabel">Pages:</label>
                <input type="number" name="pages" id="pages" required>
                <label for="wasRead" class="readLabel">Read:</label>
                <input type="checkbox" name="wasRead" id="wasRead">

                <div class="buttonContainer">
                    <button type="button" class="cancelDialog">Cancel</button>
                    <button type="submit" class="addBookFormButton">Add book</button>
                </div>
            </form>
        </dialog>
    </main>
</body>
</html>
